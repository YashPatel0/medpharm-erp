apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: med-erp
  labels:
    app: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service

          image: yashpatel017/docker-order-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8083
              protocol: TCP

          env:
            - name: MONGODB_URI
              value: "mongodb+srv://yashpatel_db:Yash123@cluster0.pmctvcs.mongodb.net/orders_db?retryWrites=true&w=majority&appName=Cluster0"

            - name: JWT_SECRET
              value: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"

            - name: CORS_ALLOWED_ORIGINS
              value: "*"

            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082/api/v1"

            - name: USER_SERVICE_URL
              value: "http://user-service:8081/api/v1"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "1Gi"
              cpu: "500m"


---

apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: med-erp

spec:
  selector:
    app: order-service

  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083

  type: ClusterIP